name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose --all

      - name: Run streaming tests
        run: cargo test --verbose --test streaming_unit_test --test streaming_test

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings

      - name: Generate test report
        if: always()
        run: |
          cargo test --all 2>&1 | tee test_output.txt
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          grep -E "(passed|failed|test result)" test_output.txt >> $GITHUB_STEP_SUMMARY || true

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose --all

  build-musl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build musl static binary
        run: cargo build --target x86_64-unknown-linux-musl --release --verbose

      - name: Check binary size
        run: |
          ls -lh target/x86_64-unknown-linux-musl/release/quickhorse
          echo "## Musl Binary Size" >> $GITHUB_STEP_SUMMARY
          ls -lh target/x86_64-unknown-linux-musl/release/quickhorse >> $GITHUB_STEP_SUMMARY